<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>archview</title>
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/graph.css">
<script defer src="/cytoscape.min.js"></script>
<script defer src="/dagre.min.js"></script>
<script defer src="/cytoscape-dagre.js"></script>
<script defer src="/js/cy-style.js"></script>
<script defer src="/js/cy.js"></script>
<script defer src="/js/collapse.js"></script>
<script defer src="/js/focus-tooltip.js"></script>
<script defer src="/js/layout.js"></script>
<script defer src="/js/graph-data.js"></script>
<script defer src="/js/controls.js"></script>
<script defer src="/js/annotations.js"></script>
<script defer src="/js/annotations-draw.js"></script>
<script defer src="/js/main.js"></script>
</head>
<body>


<div id="header">
  <div id="brand">arch<span>view</span></div>

  <div id="legend">
    <div class="legend-item"><span class="legend-dot" style="background:#6ee7b7"></span>Entry Point</div>
    <div class="legend-item"><span class="legend-dot" style="background:#93c5fd"></span>Connector</div>
    <div class="legend-item"><span class="legend-dot" style="background:#fca5a5"></span>Utility</div>
    <div class="legend-item"><span class="legend-dot" style="background:#3a3a46"></span>Isolated</div>
    <div class="legend-item"><span class="legend-dot" style="background:#dc2626"></span>Error</div>
    <div class="legend-sep"></div>
    <div class="legend-badge"><span class="ltype">fn</span> function</div>
    <div class="legend-badge"><span class="ltype">cls</span> class</div>
    <div class="legend-badge"><span class="ltype">var</span> variable</div>
  </div>

  <div id="controls">
    <div id="diff-controls">
      <select id="diff-ref"><option value="">Diff…</option></select>
    </div>
    <span id="status">Loading…</span>
    <button id="btn-fit">Fit</button>
    <button id="btn-layout">Reset layout</button>
    <button id="btn-folders">Collapse all</button>
    <button id="btn-png">PNG</button>
    <button id="btn-save" class="primary">Save</button>
  </div>
</div>

<div id="graph-wrap">
  <div id="cy"></div>
  <div id="anno-layer"><div id="anno-viewport"></div></div>
  <div id="anno-toolbar">
    <button class="tool-btn active" data-tool="" title="Select (Esc)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51z"/></svg>
    </button>
    <button class="tool-btn" data-tool="box" title="Draw box">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
    </button>
    <button class="tool-btn" data-tool="text" title="Add text">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="12" y1="4" x2="12" y2="20"/><line x1="8" y1="20" x2="16" y2="20"/></svg>
    </button>
    <button class="tool-btn" data-tool="eraser" title="Erase annotation">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20H7l-4-4 10-10 8 8-4 4z"/><line x1="18" y1="13" x2="11" y2="6"/></svg>
    </button>
  </div>
</div>
<div id="tooltip">
  <div class="tt-name"></div>
  <div class="tt-doc"></div>
  <div class="tt-type"></div>
  <div class="tt-symbols"></div>
</div>

</body>
</html>
